<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Kukuruza News</title>
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDK2Tehci8QyIprpW-BPquNWExG6olOe9o",
  authDomain: "kukuruza-news.firebaseapp.com",
  projectId: "kukuruza-news",
  storageBucket: "kukuruza-news.firebasestorage.app",
  messagingSenderId: "1044182496668",
  appId: "1:1044182496668:web:0cce99dfeb0a2d9cd88459"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();
</script>

</head>

<body>

<button id="admin-btn">⚙️</button>

<div class="admin-panel" id="admin-panel">
    <input type="password" id="admin-pass" placeholder="Пароль">

    <div id="admin-content" style="display:none;">
        <input id="title-ru" placeholder="Заголовок RU">
        <input id="title-en" placeholder="Title EN">
        <input id="author" placeholder="Автор">
        <textarea id="text-ru" placeholder="Текст RU"></textarea>
        <textarea id="text-en" placeholder="Text EN"></textarea>
        <input type="file" id="image">
        <button onclick="addArticle()">Добавить</button>
    </div>
</div>

<button id="theme-toggle">🌙</button>
<button id="lang-toggle">EN</button>

<footer id="global-footer">© Кукуруза.com, все права защищены</footer>

<div class="slider">

    <button class="nav prev" onclick="prevSlide()">❮</button>
    <button class="nav next" onclick="nextSlide()">❯</button>

    <div class="slides">

        <section class="slide intro active" id="intro-slide">
            <div class="intro-overlay">
                <h1 data-ru="Кукуруза News" data-en="Kukuruza News"></h1>
                <p data-ru="Современная интернет-газета о людях, культуре и мнениях."
                   data-en="A modern online newspaper about people, culture, and opinions."></p>
            </div>
        </section>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let current = 0;
let slides = document.querySelectorAll(".slide");

function refreshSlides(){
    slides = document.querySelectorAll(".slide");
}

function showSlide(index){

    refreshSlides();

    slides.forEach(s => s.classList.remove("active"));

    if(index < 0) index = slides.length - 1;
    if(index >= slides.length) index = 0;

    current = index;
    slides[current].classList.add("active");

    updateScrollLock();
}

window.nextSlide = () => showSlide(current + 1);
window.prevSlide = () => showSlide(current - 1);

function updateScrollLock(){
    const isIntro = slides[current].classList.contains("intro");
    document.body.style.overflow = isIntro ? "hidden" : "auto";
}

// ================= LANGUAGE =================
let lang = "ru";

function updateLang(){
    document.querySelectorAll("[data-ru]").forEach(el=>{
        el.innerText = el.getAttribute(`data-${lang}`);
    });

    document.getElementById("lang-toggle").innerText =
        lang === "ru" ? "EN" : "RU";
}

document.getElementById("lang-toggle").onclick = () => {
    lang = lang === "ru" ? "en" : "ru";
    updateLang();
};

// ================= THEME =================
let dark = false;

function updateTheme(){
    document.body.classList.toggle("dark-mode", dark);
    document.getElementById("theme-toggle").innerText = dark ? "☀️" : "🌙";
}

document.getElementById("theme-toggle").onclick = () => {
    dark = !dark;
    updateTheme();
};

// ================= ADMIN =================
const adminBtn = document.getElementById("admin-btn");
const adminPanel = document.getElementById("admin-panel");

adminBtn.onclick = () => {
    adminPanel.style.display = "flex";
};

document.getElementById("admin-pass").oninput = (e) => {
    if(e.target.value === "1243"){
        document.getElementById("admin-content").style.display = "flex";
    }
};

// 👇 FIX: теперь работает глобально
async function addArticle(){

    const titleRU = document.getElementById("title-ru").value;
    const titleEN = document.getElementById("title-en").value;
    const textRU = document.getElementById("text-ru").value;
    const textEN = document.getElementById("text-en").value;
    const author = document.getElementById("author").value;
    const file = document.getElementById("image").files[0];

    let imageUrl = "";

    if(file){
        const ref = storage.ref("images/" + Date.now() + file.name);
        await ref.put(file);
        imageUrl = await ref.getDownloadURL();
    }

    await db.collection("articles").add({
        titleRU, titleEN, textRU, textEN, author, imageUrl,
        date: new Date()
    });

    alert("Статья добавлена!");
}

// 👇 FIX: глобальная доступность для onclick
window.addArticle = addArticle;

// ================= LOAD ARTICLES =================
async function loadArticles(){

    const snapshot = await db.collection("articles").get();

    snapshot.forEach(doc => {
        const data = doc.data();

        const article = document.createElement("article");
        article.className = "slide";

        article.innerHTML = `
            <div class="site-header">
                <div class="site-title">Кукуруза.com</div>
                <div class="date">${new Date().toLocaleDateString()}</div>
            </div>

            <h2 data-ru="${data.titleRU}" data-en="${data.titleEN}"></h2>
            <p class="author">${data.author}</p>
            <p data-ru="${data.textRU}" data-en="${data.textEN}"></p>
            <img class="article-image" src="${data.imageUrl}">
        `;

        document.querySelector(".slides").appendChild(article);
    });

    refreshSlides();
    updateLang();
    showSlide(current);
}

loadArticles();

// ================= INIT =================
updateLang();
updateTheme();
showSlide(0);

});
</script>

</body>
</html>
