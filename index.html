<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кукуруза.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<button id="theme-toggle">🌙</button>
<button id="lang-toggle">EN</button>

<footer id="global-footer">© Кукуруза.com, все права защищены</footer>

<div class="slider">

    <!-- СТРЕЛКИ -->
    <button class="nav prev" onclick="prevSlide()">❮</button>
    <button class="nav next" onclick="nextSlide()">❯</button>

    <div class="slides">

        <!-- ГЛАВНЫЙ -->
        <section class="slide active intro" id="intro-slide">
            <div class="intro-overlay">
                <h1 data-ru="Кукуруза.com" data-en="Kukuruza.com"></h1>

                <p data-ru="Современная интернет-газета о музыке, культуре и мнениях"
                   data-en="Modern online magazine about music, culture and opinions">
                </p>

                <p class="hint"
                   data-ru="→ Нажми стрелку справа"
                   data-en="→ Press the right arrow">
                </p>
            </div>
        </section>

        <!-- ПРИМЕР СТАТЬИ -->
        <article class="slide">
            <h2 data-ru="Пример статьи" data-en="Example article"></h2>
            <p data-ru="Текст статьи..." data-en="Article text..."></p>
            <img class="article-image" src="images/article1.jpg">
        </article>

    </div>
</div>

<script>
// СЛАЙДЫ
let current = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(index) {
    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");
}

function nextSlide() {
    current = (current + 1) % slides.length;
    showSlide(current);
}

function prevSlide() {
    current = (current - 1 + slides.length) % slides.length;
    showSlide(current);
}

// ТЕМА
document.getElementById('theme-toggle').onclick = () => {
    document.body.classList.toggle('dark-mode');
};

// ЯЗЫК
let currentLang = "ru";

function updateLanguage() {
    document.querySelectorAll("[data-ru]").forEach(el => {
        el.innerText = el.getAttribute(`data-${currentLang}`);
    });
}

document.getElementById('lang-toggle').onclick = () => {
    currentLang = currentLang === "ru" ? "en" : "ru";
    updateLanguage();
    document.getElementById('lang-toggle').innerText =
        currentLang === "ru" ? "EN" : "RU";
};

updateLanguage();

// ФОН
const introSlide = document.getElementById('intro-slide');

const bgImages = [
    'images/intro1.jpg',
    'images/intro2.jpg',
    'images/intro3.jpg',
    'images/intro4.jpg'
];

let bgIndex = 0;

function changeBackground() {
    introSlide.style.backgroundImage =
        `url('${bgImages[bgIndex]}?t=${Date.now()}')`;

    bgIndex = (bgIndex + 1) % bgImages.length;
}

setInterval(changeBackground, 5000);
changeBackground();

</script>

</body>
</html>
