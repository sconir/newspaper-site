<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кукуруза.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Кукуруза.com</h1>
    <p class="date">6 апреля 2026</p>
</header>

<main>

<div class="slider">

    <button class="nav prev" onclick="prevSlide()">❮</button>

    <div class="slides">

        <article class="slide active">
            <img class="article-image" src="images/article1.jpg" alt="Картинка">

            <h2>Кто убил лирический реп?</h2>
            <p class="author">Автор: Илья Коряков</p>

            <p>
                Что вообще можно считать лирическим репом? Я не знаю, но тогда кто знает?
            </p>
        </article>

        <article class="slide">
            <img class="article-image" src="images/article2.jpg" alt="Картинка">

            <h2>Venom Boy</h2>
            <p class="author">Автор: Sweet Dreams</p>

            <p>
                Это вторая статья. Добавь интересный текст или историю.
            </p>
        </article>

    </div>

    <button class="nav next" onclick="nextSlide()">❯</button>

</div>

</main>

<footer>
    <p>© 2026 Кукуруза.com</p>
</footer>

<script>
let current = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(index) {
    slides.forEach(slide => slide.classList.remove("active"));
    slides[index].classList.add("active");
}

function nextSlide() {
    current = (current + 1) % slides.length;
    showSlide(current);
}

function prevSlide() {
    current = (current - 1 + slides.length) % slides.length;
    showSlide(current);
}
</script>

</body>
</html>
