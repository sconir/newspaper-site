<script>
// SLIDES
let current = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(index){
    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");
}

function nextSlide(){
    current = (current + 1) % slides.length;
    showSlide(current);
}

function prevSlide(){
    current = (current - 1 + slides.length) % slides.length;
    showSlide(current);
}

// DATES
for(let i=1;i<=8;i++){
    const el = document.getElementById(`date-${i}`);
    if(el) el.innerText = new Date().toLocaleDateString('ru-RU');
}

// LANGUAGE
let lang = "ru";

function updateLang(){
    document.querySelectorAll("[data-ru]").forEach(el=>{
        el.innerText = el.getAttribute(`data-${lang}`);
    });

    document.getElementById("lang-toggle").innerText =
        lang === "ru" ? "EN" : "RU";
}

document.getElementById("lang-toggle").onclick = () => {
    lang = lang === "ru" ? "en" : "ru";
    updateLang();
};

// THEME
let dark = false;

function updateTheme(){
    document.body.classList.toggle("dark-mode", dark);

    document.getElementById("theme-toggle").innerText =
        dark ? "☀️" : "🌙";
}

document.getElementById("theme-toggle").onclick = () => {
    dark = !dark;
    updateTheme();
};

// BACKGROUND ROTATION
const introSlide = document.getElementById('intro-slide');

const bgImages = [
    'images/intro1.jpg',
    'images/intro2.jpg',
    'images/intro3.jpg',
    'images/intro4.jpg',
    'images/intro5.jpg',
    'images/intro6.jpg',
    'images/intro7.jpg',
    'images/intro8.jpg',
    'images/intro9.jpg',
    'images/intro10.jpg'
];

let bgIndex = 0;

function changeBackground(){
    introSlide.style.backgroundImage =
        `url('${bgImages[bgIndex]}?t=${Date.now()}')`;

    bgIndex = (bgIndex + 1) % bgImages.length;
}

setInterval(changeBackground, 5000);
changeBackground();
</script>
