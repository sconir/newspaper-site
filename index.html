<script>
// ================= SLIDES =================
let current = 0;

function getSlides(){
    return document.querySelectorAll(".slide");
}

function showSlide(index){
    const slides = getSlides();

    slides.forEach(s => s.classList.remove("active"));

    if(index < 0) index = slides.length - 1;
    if(index >= slides.length) index = 0;

    current = index;
    slides[current].classList.add("active");
}

function nextSlide(){ showSlide(current + 1); }
function prevSlide(){ showSlide(current - 1); }

// ================= LANGUAGE =================
let lang = "ru";

function updateLang(){
    document.querySelectorAll("[data-ru]").forEach(el=>{
        el.innerText = el.getAttribute(`data-${lang}`);
    });

    document.getElementById("lang-toggle").innerText =
        lang === "ru" ? "EN" : "RU";
}

document.getElementById("lang-toggle").onclick = () => {
    lang = lang === "ru" ? "en" : "ru";
    updateLang();
};

// ================= THEME =================
let dark = false;

function updateTheme(){
    document.body.classList.toggle("dark-mode", dark);
    document.getElementById("theme-toggle").innerText = dark ? "☀️" : "🌙";
}

document.getElementById("theme-toggle").onclick = () => {
    dark = !dark;
    updateTheme();
};

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
    updateLang();
    updateTheme();
    showSlide(0);
});
// ================= PRO INTRO BACKGROUND =================

const images = [
    "images/intro1.jpg",
    "images/intro2.jpg",
    "images/intro3.jpg",
    "images/intro4.jpg",
    "images/intro5.jpg",
    "images/intro6.jpg",
    "images/intro7.jpg",
    "images/intro8.jpg",
    "images/intro9.jpg",
    "images/intro10.jpg"
];

// preload (очень важно для PRO плавности)
images.forEach(src => {
    const img = new Image();
    img.src = src;
});

const bg1 = document.querySelector(".bg1");
const bg2 = document.querySelector(".bg2");

let current = 0;
let showingFirst = true;

function nextImage(){
    let next;

    do {
        next = Math.floor(Math.random() * images.length);
    } while(next === current);

    current = next;

    const active = showingFirst ? bg1 : bg2;
    const inactive = showingFirst ? bg2 : bg1;

    inactive.style.backgroundImage = `url('${images[current]}')`;
    inactive.style.opacity = "1";
    active.style.opacity = "0";

    showingFirst = !showingFirst;
}

// стартовое изображение
bg1.style.backgroundImage = `url('${images[0]}')`;

// запуск
setInterval(nextImage, 10000);
</script>
